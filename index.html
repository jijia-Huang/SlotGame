<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>3POT Cascade Prototype</title>
  </head>
  <body>
    <audio id="main-game-bgm" src="%BASE_URL%assets/audio/main_game_bgm.wav" preload="auto" autoplay loop></audio>
    <div id="app">
      <div id="game-root"></div>
      <div id="hud" aria-label="slot controls">
        <div class="meter">
          <span>Balance</span>
          <strong id="balance">$1,000</strong>
        </div>
        <div class="meter">
          <span>Bet</span>
          <strong id="bet">$20</strong>
        </div>
        <button id="spin-button" type="button" aria-label="Spin">
          <span aria-hidden="true">3POT</span>
          <span>Spin</span>
        </button>
        <div class="meter">
          <span>Win</span>
          <strong id="win">$0</strong>
        </div>
        <div class="status" id="status">Ready</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
